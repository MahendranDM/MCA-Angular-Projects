<!doctype html>
<html ng-app="campus360">

<head>
    <meta charset="UTF-8">
    <title>College Dashboard</title>

    <script src="node_modules/angular/angular.min.js"></script>
    <script src="js/app.js"></script>
</head>

<body ng-controller="dashboardController">

    <h1>{{collegeName}}</h1>

    <input type="text"
           ng-model="collegeName">

    <br><br>

    <input type="number"
           ng-model="totalStudents">

    <p>Total Students : {{totalStudents}}</p>

    <button ng-click="addStudent()">
        Add Student
    </button>

    <br><br>

    <input type="number"
           ng-model="totalFaculty">

    <p>Total Faculty : {{totalFaculty}}</p>

    <button ng-click="totalFaculty = totalFaculty + 1">
        Add Faculty
    </button>

    <hr>

    <h2>Student List</h2>

    <button ng-click="showStudents = !showStudents">
       Show Students
    </button>

    <ul ng-show="showStudents">
        <li ng-repeat="student in students">
            {{student}}
        </li>
    </ul>

</body>

</html>
